<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scanner Ultra Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff0000;
            --neon-green: #00ff88;
            --neon-yellow: #ffcc00;
            --glass: rgba(10, 10, 10, 0.8);
        }

        /* Background Video e Overlay */
        #video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* Animações */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        body { 
            font-family: 'Inter', sans-serif; color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Header */
        header { text-align: center; padding: 40px 0; animation: slideUp 0.8s ease; }
        
        .scanner-circle {
            width: 80px; height: 80px; border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary-red); border-radius: 50%;
            margin: 0 auto 20px; animation: spin 2s linear infinite;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem;
            color: var(--primary-red); letter-spacing: 6px; margin: 0;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        /* Container Principal */
        .main-card {
            background: var(--glass); width: 90%; max-width: 750px;
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: slideUp 1s ease;
        }

        textarea {
            width: 100%; height: 160px; background: rgba(0,0,0,0.5); border: 1px solid #333;
            border-radius: 15px; padding: 20px; color: #fff; font-size: 1rem;
            resize: none; transition: 0.3s; box-sizing: border-box; font-family: 'Inter', sans-serif;
        }

        textarea:focus { border-color: var(--primary-red); outline: none; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }

        button {
            width: 100%; background: var(--primary-red); color: white; border: none;
            padding: 20px; border-radius: 15px; margin-top: 25px;
            font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer;
            letter-spacing: 3px; transition: 0.4s; text-transform: uppercase;
        }

        button:hover { filter: brightness(1.2); letter-spacing: 5px; box-shadow: 0 0 30px var(--primary-red); }

        /* Dashboard de Resultados */
        #resultado { margin-top: 40px; display: none; animation: slideUp 0.6s ease forwards; }
        
        .status-line { 
            display: flex; justify-content: space-between; align-items: center; 
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
        }

        .perc-badge {
            background: rgba(255, 255, 255, 0.1); padding: 5px 20px; 
            border-radius: 50px; font-size: 1rem; border: 1px solid currentColor;
        }

        .progress-container { background: rgba(255,255,255,0.05); height: 14px; border-radius: 20px; margin: 25px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.1, 0, 0.1, 1); border-radius: 20px; }

        /* Grid de Dados */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
        .data-box { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .data-box i { color: var(--primary-red); margin-bottom: 8px; font-size: 1.2rem; }
        .data-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-size: 1rem; font-weight: bold; margin-top: 5px; display: block; }

        /* Cores Dinâmicas */
        .AltaQualidade .status-line, .AltaQualidade .perc-badge { color: var(--neon-green); }
        .AltaQualidade .progress-bar { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }

        .QualidadeMédia .status-line, .QualidadeMédia .perc-badge { color: var(--neon-yellow); }
        .QualidadeMédia .progress-bar { background: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow); }

        .BaixaQualidade .status-line, .BaixaQualidade .perc-badge { color: var(--primary-red); }
        .BaixaQualidade .progress-bar { background: var(--primary-red); box-shadow: 0 0 15px var(--primary-red); }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="igreja.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header>
        <div class="scanner-circle">
            <i class="fas fa-microchip" style="color: white; font-size: 1.8rem;"></i>
        </div>
        <h1 class="header-title">AI SCANNER ULTRA</h1>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 3px; margin-top: 10px;">INTERFACE SCANNER V4.0</p>
    </header>

    <div class="main-card">
        <textarea id="textoInput" placeholder="Aguardando entrada de dados brutos para processamento..."></textarea>
        
        <button onclick="analisar()">
            <i class="fas fa-bolt"></i> Executar Scanner Neural
        </button>

        <div id="resultado">
            <div class="status-line">
                <span id="resStatus"></span>
                <span id="resPorcentagem" class="perc-badge">0%</span>
            </div>

            <div class="progress-container">
                <div id="resBarra" class="progress-bar"></div>
            </div>

            <div class="data-box" style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
                <div class="data-label">Veredito do Sistema</div>
                <div id="resMotivo" class="data-value" style="color: #ddd;"></div>
            </div>

            <div class="data-grid">
                <div class="data-box">
                    <i class="fas fa-font"></i>
                    <span class="data-label">Palavras</span>
                    <span id="valPalavras" class="data-value">0</span>
                </div>
                <div class="data-box">
                    <i class="fas fa-align-left"></i>
                    <span class="data-label">Caracteres</span>
                    <span id="valChars" class="data-value">0</span>
                </div>
                <div class="data-box">
                    <i class="fas fa-code"></i>
                    <span class="data-label">Termos IA</span>
                    <span id="valTermos" class="data-value">0</span>
                </div>
                <div class="data-box">
                    <i class="fas fa-tachometer-alt"></i>
                    <span class="data-label">Latência</span>
                    <span id="valLatencia" class="data-value">0ms</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analisar() {
            const texto = document.getElementById('textoInput').value;
            const divRes = document.getElementById('resultado');
            const barra = document.getElementById('resBarra');

            if(!texto.trim()) return alert("ALERTA: O scanner não pode processar campos vazios.");

            // Reset da animação
            barra.style.width = "0%";

            try {
                const response = await fetch('http://127.0.0.1:5000/analisar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conteudo: texto })
                });

                const data = await response.json();
                const analise = data.analise_ia;

                // Mostra o dashboard
                divRes.style.display = 'block';
                divRes.className = analise.classe;

                // Preenchimento de dados
                document.getElementById('resStatus').innerText = analise.status;
                document.getElementById('resPorcentagem').innerText = analise.confianca;
                document.getElementById('resMotivo').innerText = analise.motivo;
                
                // Métricas
                document.getElementById('valPalavras').innerText = data.metricas.palavras;
                document.getElementById('valChars').innerText = data.metricas.caracteres;
                document.getElementById('valTermos').innerText = data.metricas.termos;
                document.getElementById('valLatencia').innerText = data.metricas.latencia;

                // Animação da barra de progresso
                setTimeout(() => {
                    barra.style.width = analise.confianca;
                }, 100);

            } catch (e) {
                alert("ERRO CRÍTICO: Núcleo de processamento offline.");
            }
        }
    </script>
</body>
</html>
